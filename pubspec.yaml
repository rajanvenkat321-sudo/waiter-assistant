name: waiter_assistant
description: MVP Waiter Assistant App for small restaurants in India.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  cloud_firestore: ^6.1.3
  firebase_core: ^4.5.0
  flutter:
    sdk: flutter
  
  # State management — swap to Riverpod later if needed
  google_fonts: ^8.0.2
  provider: ^6.1.2
  
  # UUID generator for mock order IDs
  # Firebase will replace this with auto-generated Firestore document IDs
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
